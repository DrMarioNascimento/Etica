name: Ajusta escala dos personagens

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ajusta-escala-personagens.yml'

permissions:
  contents: write

jobs:
  ajustar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar correção visual
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('bonde-responsivo/index.html')
          text = path.read_text(encoding='utf-8')

          marker = '/* Profundidade da cena: secundário ao fundo, principal à frente. */'
          css = '''/* Referência visual: trabalhador. Cientista e desconhecido são compensados\n   pelas diferenças internas de seus SVGs, sem alterar o trabalhador. */\n.track-char.cientista-final .cientista-svg{\n  transform:scale(1.15) !important;\n  transform-origin:center bottom !important;\n}\n.track-char.desconhecido-final .desconhecido-svg{\n  transform:scale(1.29) !important;\n  transform-origin:center bottom !important;\n}\n\n'''

          if 'Referência visual: trabalhador.' not in text:
              if marker not in text:
                  raise SystemExit('Marcador CSS não encontrado')
              text = text.replace(marker, css + marker, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Remover workflow temporário
        run: rm -f .github/workflows/ajusta-escala-personagens.yml

      - name: Commitar correção
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bonde-responsivo/index.html .github/workflows/ajusta-escala-personagens.yml
          git commit -m "Usa trabalhador como referência de escala" || exit 0
          git push
